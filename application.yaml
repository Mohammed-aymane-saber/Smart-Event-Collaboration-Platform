apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-event-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Mohammed-aymane-saber/Smart-Event-Collaboration-Platform.git'
    targetRevision: HEAD
    path: k8s
   
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
