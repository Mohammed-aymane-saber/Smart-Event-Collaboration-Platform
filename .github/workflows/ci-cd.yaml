name: CI-CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  CI:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: events_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v3

    # Setup Node.js v20 (Required for Vite) and enable NPM caching!
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Install dependencies faster concurrently
    - name: Install dependencies
      run: |
        npm --prefix authService ci &
        npm --prefix eventService ci &
        npm --prefix interactionService ci &
        npm --prefix gateway ci &
        npm --prefix frontend ci &
        wait

    # Run tests (Fixed folder names)
    - name: Run tests
      run: |
        npm --prefix authService test || echo "no tests"
        npm --prefix eventService test || echo "no tests"
        npm --prefix interactionService test || echo "no tests"

    # Build Docker images
    - name: Build Docker images
      run: docker compose build