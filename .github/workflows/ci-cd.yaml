name: CI-CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  CI:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: events_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v3

    # Setup Node.js v20 (Required for Vite) and enable NPM caching!
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Install dependencies faster concurrently
    - name: Install dependencies
      run: |
        npm --prefix authService ci &
        npm --prefix eventService ci &
        npm --prefix interactionService ci &
        npm --prefix gateway ci &
        npm --prefix frontend ci &
        wait

    # Run tests (Fixed folder names)
    - name: Run tests
      run: |
        npm --prefix authService test || echo "no tests"
        npm --prefix eventService test || echo "no tests"
        npm --prefix interactionService test || echo "no tests"

    # Login to Docker Hub (Requires Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN)
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build and Push Docker images
    - name: Build and Push Microservices
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest ./authService
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/event-service:latest ./eventService
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/interaction-service:latest ./interactionService
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gateway:latest ./gateway
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./frontend
        
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/event-service:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/interaction-service:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/gateway:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest